<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique — Proxikau</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<style>
:root{
  --vert:#2D6A4F;--vert2:#1B4332;--vert-light:#D8F3DC;
  --terre:#BC6C25;--terre-light:#FDEBD0;
  --ink:#1A1A1A;--ink2:#555;--ink3:#999;
  --border:#E0E0E0;--bg:#F9F7F4;--white:#fff;
  --error:#D32F2F;--sans:'Inter',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);}
nav{background:var(--white);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:50;}
.logo{font-size:20px;font-weight:700;color:var(--vert);text-decoration:none;}
.logo span{color:var(--terre);}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn-panier{position:relative;background:var(--vert);color:#fff;border:none;border-radius:10px;padding:11px 22px;font-family:var(--sans);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;box-shadow:0 2px 8px rgba(45,106,79,.3);transition:all .2s;}
.btn-panier:hover{background:var(--vert2);transform:translateY(-1px);box-shadow:0 4px 12px rgba(45,106,79,.4);}
.btn-panier.bump{animation:bump .3s ease;}
@keyframes bump{0%{transform:scale(1);}50%{transform:scale(1.12);}100%{transform:scale(1);}}
.panier-count{position:absolute;top:-8px;right:-8px;background:var(--terre);color:#fff;min-width:20px;height:20px;border-radius:10px;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;padding:0 5px;display:none;box-shadow:0 2px 6px rgba(188,108,37,.5);border:2px solid #fff;animation:pop .25s ease;}
@keyframes pop{0%{transform:scale(0);}70%{transform:scale(1.2);}100%{transform:scale(1);}}
.btn-connexion{font-size:13px;color:var(--ink2);text-decoration:none;padding:7px 12px;border:1px solid var(--border);border-radius:8px;}
.banniere{height:240px;background:linear-gradient(135deg,#0D2B1F 0%,#1B4332 40%,#2D6A4F 70%,#40916C 100%);position:relative;overflow:hidden;display:flex;align-items:flex-end;}
@media(min-width:600px){.banniere{height:280px;}}
.banniere-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.banniere-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.6) 0%,transparent 60%);}
.boutique-header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 20px 20px;}
.boutique-header-inner{max-width:1000px;margin:0 auto;display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap;}
.boutique-logo{width:80px;height:80px;border-radius:50%;background:linear-gradient(145deg,#40916C,#1B4332);border:4px solid var(--white);box-shadow:0 4px 16px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;margin-top:-24px;position:relative;z-index:2;overflow:hidden;}
.boutique-info{flex:1;min-width:200px;padding-top:4px;}
.boutique-cat-badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;background:var(--vert-light);color:var(--vert2);}
.boutique-nom{font-size:20px;font-weight:700;color:var(--ink);}
.boutique-meta{display:flex;flex-wrap:wrap;gap:10px;font-size:13px;color:var(--ink2);margin-bottom:8px;}
.boutique-desc{font-size:14px;color:var(--ink2);line-height:1.6;max-width:600px;}
.boutique-livraisons{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.liv-badge{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--bg);border:1px solid var(--border);color:var(--ink2);font-weight:500;}
.note-badge{display:inline-flex;align-items:center;gap:4px;background:var(--terre-light);color:var(--terre);padding:4px 10px;border-radius:20px;font-size:13px;font-weight:600;}
.layout{max-width:1000px;margin:0 auto;padding:24px 16px;}
.filtres{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.filtres::-webkit-scrollbar{display:none;}
.filtre-btn{flex-shrink:0;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-family:var(--sans);font-size:13px;font-weight:500;color:var(--ink2);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filtre-btn:hover,.filtre-btn.active{border-color:var(--vert);background:var(--vert-light);color:var(--vert2);}
.produits-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
@media(min-width:500px){.produits-grid{grid-template-columns:repeat(2,1fr);gap:16px;}}
@media(min-width:768px){.produits-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:900px){.produits-grid{grid-template-columns:repeat(4,1fr);}}
.produit-card{background:var(--white);border-radius:12px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .15s;cursor:pointer;}
.produit-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);}
.produit-photo{aspect-ratio:1;background:var(--bg);position:relative;overflow:hidden;}
.produit-photo img{width:100%;height:100%;object-fit:cover;transition:transform .3s;}
.produit-card:hover .produit-photo img{transform:scale(1.05);}
.produit-photo-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:40px;}
.produit-body{padding:12px;}
.produit-nom{font-size:14px;font-weight:600;color:var(--ink);margin-bottom:4px;line-height:1.3;}
.produit-desc-short{font-size:12px;color:var(--ink3);margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.produit-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.produit-prix{font-size:16px;font-weight:700;color:var(--vert);}
.produit-unite{font-size:11px;color:var(--ink3);}
.btn-ajouter{width:32px;height:32px;border-radius:8px;background:var(--vert);color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s;}
.btn-ajouter:hover{background:var(--vert2);}
.stock-badge{font-size:10px;color:var(--error);font-weight:600;}
.empty{text-align:center;padding:48px 20px;color:var(--ink3);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.loading{text-align:center;padding:48px;color:var(--ink3);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px;}}
.modal{background:var(--white);border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.modal{border-radius:16px;max-width:520px;}}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
@media(min-width:600px){.modal-handle{display:none;}}
.modal-photos{width:100%;aspect-ratio:1;background:var(--bg);position:relative;overflow:hidden;}
.modal-photos img{width:100%;height:100%;object-fit:cover;}
.modal-photos-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:72px;}
.modal-body{padding:20px;}
.modal-close{position:absolute;top:12px;right:12px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;z-index:10;}
.modal-nom{font-size:20px;font-weight:700;margin-bottom:6px;}
.modal-prix{font-size:22px;font-weight:700;color:var(--vert);margin-bottom:12px;}
.modal-desc{font-size:14px;color:var(--ink2);line-height:1.6;margin-bottom:16px;}
.modal-livraisons{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.modal-section-title{font-size:12px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.quantite-wrap{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.btn-qty{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:600;}
.btn-qty:hover{border-color:var(--vert);}
.qty-val{font-size:18px;font-weight:700;min-width:32px;text-align:center;}
.btn-add-panier{width:100%;padding:14px;border-radius:10px;background:var(--vert);color:#fff;border:none;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;}
.btn-add-panier:hover{background:var(--vert2);}
.panier-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:none;align-items:flex-end;justify-content:flex-end;}
.panier-overlay.open{display:flex;}
@media(min-width:600px){.panier-overlay{padding:20px;align-items:flex-start;}}
.panier-drawer{background:var(--white);width:100%;max-width:380px;height:85vh;border-radius:20px 20px 0 0;overflow-y:auto;display:flex;flex-direction:column;}
@media(min-width:600px){.panier-drawer{border-radius:16px;height:auto;max-height:85vh;margin-top:76px;}}
.panier-head{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1;}
.panier-title{font-size:18px;font-weight:700;}
.panier-close{width:32px;height:32px;border-radius:50%;border:none;background:var(--bg);cursor:pointer;font-size:16px;}
.panier-items{flex:1;padding:16px;overflow-y:auto;}
.panier-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.panier-item:last-child{border-bottom:none;}
.panier-item-photo{width:56px;height:56px;border-radius:8px;background:var(--bg);object-fit:cover;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;}
.panier-item-info{flex:1;}
.panier-item-nom{font-size:14px;font-weight:600;margin-bottom:4px;}
.panier-item-prix{font-size:13px;color:var(--vert);font-weight:600;}
.panier-item-qty{display:flex;align-items:center;gap:8px;margin-top:6px;}
.btn-qty-sm{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--white);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qty-sm-val{font-size:14px;font-weight:600;min-width:20px;text-align:center;}
.btn-remove{margin-left:auto;background:none;border:none;cursor:pointer;font-size:18px;color:var(--ink3);}
.panier-footer{padding:16px;border-top:1px solid var(--border);background:var(--white);position:sticky;bottom:0;}
.panier-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;margin-bottom:14px;}
.btn-commander{width:100%;padding:14px;border-radius:10px;background:var(--vert);color:#fff;border:none;font-family:var(--sans);font-size:15px;font-weight:600;cursor:pointer;}
.btn-commander:hover{background:var(--vert2);}
.panier-empty{text-align:center;padding:40px 20px;color:var(--ink3);}
</style>
</head>
<body>

<nav>
  <a href="index.html" class="logo">Proxi<span>kau</span></a>
  <div class="nav-right">
    <button class="btn-panier" onclick="ouvrirPanier()">
      🛒 Mon panier
      <span class="panier-count" id="panier-count">0</span>
    </button>
    <a href="mes-commandes.html" class="btn-connexion" id="nav-compte">Mes commandes</a>
  </div>
</nav>

<div class="banniere" id="banniere">
  <svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 1440 200" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="200" cy="220" rx="320" ry="160" fill="rgba(64,145,108,0.22)"/>
    <ellipse cx="800" cy="240" rx="400" ry="180" fill="rgba(45,106,79,0.18)"/>
    <ellipse cx="1300" cy="210" rx="280" ry="150" fill="rgba(64,145,108,0.2)"/>
    <circle cx="1320" cy="50" r="44" fill="rgba(255,220,100,0.15)"/>
    <circle cx="1320" cy="50" r="30" fill="rgba(255,220,100,0.2)"/>
    <rect x="60" y="100" width="8" height="60" fill="rgba(255,255,255,0.08)"/>
    <ellipse cx="64" cy="90" rx="28" ry="36" fill="rgba(64,145,108,0.3)"/>
    <rect x="690" y="120" width="60" height="50" fill="rgba(255,255,255,0.07)" rx="2"/>
    <polygon points="685,122 720,95 755,122" fill="rgba(255,200,100,0.12)"/>
  </svg>
  <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.45) 0%,transparent 70%);"></div>
  <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;background:rgba(0,0,0,.42);">
    <div style="color:#fff;font-size:16px;font-weight:800;letter-spacing:6px;text-transform:uppercase;margin-bottom:12px;text-shadow:0 2px 8px rgba(0,0,0,.5);">✦ &nbsp;Bienvenue sur la boutique de&nbsp; ✦</div>
    <div style="height:1px;width:120px;background:rgba(255,255,255,.3);margin-bottom:14px;"></div>
    <div id="banniere-nom" style="color:#fff;font-size:52px;font-weight:900;letter-spacing:-2px;text-shadow:0 4px 24px rgba(0,0,0,.7);line-height:1;font-family:Georgia,serif;font-style:italic;"></div>
    <div style="height:1px;width:120px;background:rgba(255,255,255,.3);margin-top:14px;margin-bottom:10px;"></div>
    <div id="banniere-ville" style="color:rgba(255,255,255,.75);font-size:13px;letter-spacing:2px;text-transform:uppercase;"></div>
  </div>
</div>

<div class="boutique-header">
  <div class="boutique-header-inner">
    <div class="boutique-logo" id="boutique-logo">🏪</div>
    <div class="boutique-info">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <div class="boutique-nom" id="boutique-nom">Chargement...</div>
        <span class="boutique-cat-badge" id="boutique-cat-badge"></span>
      </div>
      <div class="boutique-meta">
        <span id="boutique-ville"></span>
        <span id="boutique-note"></span>
      </div>
      <div class="boutique-desc" id="boutique-desc"></div>
      <div class="boutique-livraisons" id="boutique-livraisons"></div>
    </div>
  </div>
</div>

<div class="layout">
  <div class="filtres" id="filtres">
    <button class="filtre-btn active" onclick="filtrer('tous',this)">Tous</button>
  </div>
  <div class="produits-grid" id="produits-grid">
    <div class="loading" style="grid-column:1/-1">Chargement des produits...</div>
  </div>
</div>

<!-- MODAL PRODUIT -->
<div class="modal-overlay" id="modal-produit">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="position:relative;">
      <div class="modal-photos" id="modal-photos">
        <div class="modal-photos-placeholder" id="modal-emoji">🏪</div>
      </div>
      <button class="modal-close" onclick="fermerModalProduit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-nom" id="modal-nom"></div>
      <div class="modal-prix" id="modal-prix"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-section-title">Livraison disponible</div>
      <div class="modal-livraisons" id="modal-livraisons"></div>
      <div class="modal-section-title">Quantité</div>
      <div class="quantite-wrap">
        <button class="btn-qty" onclick="changeQty(-1)">−</button>
        <div class="qty-val" id="qty-val">1</div>
        <button class="btn-qty" onclick="changeQty(1)">+</button>
        <div style="font-size:13px;color:var(--ink3);" id="modal-stock"></div>
      </div>
      <button class="btn-add-panier" onclick="ajouterAuPanier()">Ajouter au panier</button>
    </div>
  </div>
</div>

<!-- PANIER -->
<div class="panier-overlay" id="panier-overlay">
  <div class="panier-drawer">
    <div class="panier-head">
      <div class="panier-title">Mon panier 🛒</div>
      <button class="panier-close" onclick="fermerPanier()">✕</button>
    </div>
    <div class="panier-items" id="panier-items"></div>
    <div class="panier-footer" id="panier-footer" style="display:none;">
      <div id="livraison-options"></div>
      <div class="panier-total">
        <span>Total estimé</span>
        <span id="panier-total">0.00€</span>
      </div>
      <button class="btn-commander" onclick="passerCommande()">Passer la commande →</button>
    </div>
  </div>
</div>

<script>
let boutique = null;
let produits = [];
let produitActif = null;
let qtyActuelle = 1;
let panier = [];
let filtreCourant = 'tous';

const emojis = {'viande-charcuterie':'🥩','fromage-laitier':'🧀','vins-bieres':'🍷','epicerie-terroir':'🫙','fruits-legumes':'🥦','miel-confitures':'🍯','huiles-condiments':'🫒','savons-cosmetiques':'🧴','bougies-deco':'🕯️','oeufs-volaille':'🥚'};

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const saved = localStorage.getItem('proxikau_panier');
    if (saved) { const data = JSON.parse(saved); panier = data.items || []; majPanierCount(); }
  } catch(e) {}

  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || window.location.pathname.split('/').pop().replace('.html','');
  if (!slug || slug === 'boutique') { document.getElementById('boutique-nom').textContent = 'Boutique introuvable'; return; }

  try {
    boutique = await getBoutiqueParSlug(slug);
    if (!boutique) throw new Error('Boutique introuvable');
    afficherBoutique();
    produits = await getProduitsBoutique(boutique.id);
    afficherProduits(produits);
    construireFiltres();
  } catch(e) {
    document.getElementById('boutique-nom').textContent = 'Boutique introuvable';
    document.getElementById('produits-grid').innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">😕</div><p>Cette boutique n\'existe pas ou n\'est plus disponible.</p></div>';
  }
});

async function afficherBoutique() {
  document.title = boutique.nom + ' — Proxikau';
  document.getElementById('boutique-nom').textContent = boutique.nom;
  const banNom = document.getElementById('banniere-nom');
  const banVille = document.getElementById('banniere-ville');
  if (banNom) banNom.textContent = boutique.nom;
  if (banVille && boutique.ville) banVille.innerHTML = '📍 ' + boutique.ville + (boutique.region ? ', ' + boutique.region : '');

  if (boutique.photo_banniere) {
    document.getElementById('banniere').innerHTML = `<img class="banniere-img" src="${boutique.photo_banniere}"><div class="banniere-overlay"></div>`;
  }

  const meta = [];
  if (boutique.ville) meta.push('📍 ' + boutique.ville + (boutique.region ? ', ' + boutique.region : ''));
  document.getElementById('boutique-ville').textContent = meta.join(' · ');
  if (boutique.note_moyenne > 0) document.getElementById('boutique-note').innerHTML = `<span class="note-badge">★ ${boutique.note_moyenne} (${boutique.nb_avis} avis)</span>`;
  if (boutique.description) document.getElementById('boutique-desc').textContent = boutique.description;

  const catLabels = {'viande-charcuterie':'🥩 Charcuterie','fromage-laitier':'🧀 Fromage','vins-bieres':'🍷 Vins','epicerie-terroir':'🫙 Épicerie','fruits-legumes':'🥦 Fruits & Légumes','miel-confitures':'🍯 Miel','huiles-condiments':'🫒 Huiles','savons-cosmetiques':'🧴 Cosmétiques','bougies-deco':'🕯️ Déco','oeufs-volaille':'🥚 Œufs & Volaille'};
  const catBadge = document.getElementById('boutique-cat-badge');
  if (catBadge && boutique.categorie) catBadge.textContent = catLabels[boutique.categorie] || boutique.categorie;

  const logoEl = document.getElementById('boutique-logo');
  if (boutique.photo_logo) {
    logoEl.innerHTML = `<img src="${boutique.photo_logo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;
  } else {
    logoEl.innerHTML = `<span style="font-family:Georgia,serif;font-style:italic;font-weight:800;font-size:${boutique.nom.length > 8 ? '11px' : '14px'};color:#fff;text-align:center;line-height:1.2;padding:4px;">${boutique.nom}</span>`;
  }

  const livEl = document.getElementById('boutique-livraisons');
  if (boutique.livraison_colis) livEl.innerHTML += '<span class="liv-badge">📦 Colis</span>';
  if (boutique.livraison_enlevement) livEl.innerHTML += '<span class="liv-badge">🏠 Enlèvement</span>';
  if (boutique.livraison_proximite) livEl.innerHTML += `<span class="liv-badge">🚗 Livraison ~${boutique.rayon_proximite_km}km</span>`;
}

function construireFiltres() {
  const cats = [...new Set(produits.map(p => p.categorie))];
  const el = document.getElementById('filtres');
  el.innerHTML = '<button class="filtre-btn active" onclick="filtrer(\'tous\',this)">Tous</button>';
  cats.forEach(cat => { el.innerHTML += `<button class="filtre-btn" onclick="filtrer('${cat}',this)">${emojis[cat]||''} ${cat.replace('-',' ')}</button>`; });
}

function filtrer(cat, btn) {
  document.querySelectorAll('.filtre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filtreCourant = cat;
  afficherProduits(cat === 'tous' ? produits : produits.filter(p => p.categorie === cat));
}

function afficherProduits(list) {
  const el = document.getElementById('produits-grid');
  if (!list.length) { el.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📦</div><p>Aucun produit dans cette catégorie.</p></div>'; return; }
  el.innerHTML = list.map(p => {
    const photo = p.photos && p.photos.length ? `<img src="${p.photos[0]}" alt="${p.nom}" loading="lazy">` : `<div class="produit-photo-placeholder">${emojis[p.categorie]||'📦'}</div>`;
    const stockBas = !p.stock_illimite && p.stock > 0 && p.stock <= 5;
    return `<div class="produit-card" onclick="ouvrirModalProduit('${p.id}')">
      <div class="produit-photo">${photo}</div>
      <div class="produit-body">
        <div class="produit-nom">${p.nom}</div>
        ${p.description?`<div class="produit-desc-short">${p.description}</div>`:''}
        <div class="produit-footer">
          <div>
            <div class="produit-prix">${parseFloat(p.prix).toFixed(2)}€</div>
            <div class="produit-unite">/ ${p.unite}${stockBas?` · <span class="stock-badge">Plus que ${p.stock} !</span>`:''}</div>
          </div>
          <button class="btn-ajouter" onclick="event.stopPropagation();ajouterDirectement('${p.id}')">+</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function ouvrirModalProduit(id) {
  const p = produits.find(x => x.id === id);
  if (!p) return;
  produitActif = p; qtyActuelle = 1;
  document.getElementById('modal-produit').classList.remove('open');
  document.getElementById('qty-val').textContent = 1;
  document.getElementById('modal-nom').textContent = p.nom;
  document.getElementById('modal-prix').textContent = parseFloat(p.prix).toFixed(2) + '€ / ' + p.unite;
  document.getElementById('modal-desc').textContent = p.description || '';
  const photosEl = document.getElementById('modal-photos');
  photosEl.innerHTML = '';
  if (p.photos && p.photos.length) {
    const img = document.createElement('img');
    img.src = p.photos[0]; img.alt = p.nom;
    img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    photosEl.appendChild(img);
  } else {
    const div = document.createElement('div');
    div.className = 'modal-photos-placeholder';
    div.textContent = emojis[p.categorie] || '📦';
    photosEl.appendChild(div);
  }
  document.getElementById('modal-stock').textContent = (!p.stock_illimite && p.stock <= 5) ? 'Plus que ' + p.stock + ' !' : '';
  const livEl = document.getElementById('modal-livraisons');
  livEl.innerHTML = '';
  if (boutique.livraison_colis) livEl.innerHTML += '<span class="liv-badge">📦 Colis</span>';
  if (boutique.livraison_enlevement) livEl.innerHTML += '<span class="liv-badge">🏠 Enlèvement</span>';
  if (boutique.livraison_proximite) livEl.innerHTML += `<span class="liv-badge">🚗 ~${boutique.rayon_proximite_km}km</span>`;
  requestAnimationFrame(() => { document.getElementById('modal-produit').classList.add('open'); document.body.style.overflow = 'hidden'; });
}

function fermerModalProduit() { document.getElementById('modal-produit').classList.remove('open'); document.body.style.overflow = ''; }
function changeQty(delta) { const max = produitActif && !produitActif.stock_illimite ? produitActif.stock : 99; qtyActuelle = Math.max(1, Math.min(qtyActuelle + delta, max)); document.getElementById('qty-val').textContent = qtyActuelle; }
function ajouterAuPanier() { if (!produitActif) return; ajouterItem(produitActif, qtyActuelle); fermerModalProduit(); ouvrirPanier(); }
function ajouterDirectement(id) { const p = produits.find(x => x.id === id); if (p) { ajouterItem(p, 1); majPanierCount(); } }

function ajouterItem(p, qty) {
  const existing = panier.find(i => i.id === p.id);
  if (existing) { existing.qty = Math.min(existing.qty + qty, p.stock_illimite ? 99 : p.stock); }
  else { panier.push({ id: p.id, nom: p.nom, prix: p.prix, unite: p.unite, qty, photo: p.photos?.[0]||null, emoji: emojis[p.categorie]||'📦', stock: p.stock, stock_illimite: p.stock_illimite, boutique_id: boutique.id, boutique_nom: boutique.nom, boutique_slug: boutique.slug }); }
  majPanierCount();
}

function majPanierCount() {
  const total = panier.reduce((s,i) => s+i.qty, 0);
  const el = document.getElementById('panier-count');
  el.textContent = total; el.style.display = total > 0 ? 'flex' : 'none';
  const btn = document.querySelector('.btn-panier');
  if (btn && total > 0) { btn.classList.remove('bump'); void btn.offsetWidth; btn.classList.add('bump'); }
  if (boutique) localStorage.setItem('proxikau_panier', JSON.stringify({ boutique_id: boutique.id, boutique_slug: boutique.slug, items: panier }));
}

function ouvrirPanier() { afficherPanier(); document.getElementById('panier-overlay').classList.add('open'); document.body.style.overflow = 'hidden'; }
function fermerPanier() { document.getElementById('panier-overlay').classList.remove('open'); document.body.style.overflow = ''; }

function afficherPanier() {
  const el = document.getElementById('panier-items');
  const footer = document.getElementById('panier-footer');
  if (!panier.length) { el.innerHTML = '<div class="panier-empty"><div style="font-size:40px;margin-bottom:12px;">🛒</div><p>Ton panier est vide.</p></div>'; footer.style.display = 'none'; return; }
  const groupes = {};
  panier.forEach((item, i) => {
    const bid = item.boutique_id || boutique.id;
    const bnom = item.boutique_nom || boutique.nom;
    if (!groupes[bid]) groupes[bid] = { nom: bnom, items: [] };
    groupes[bid].items.push({ ...item, index: i });
  });
  el.innerHTML = Object.entries(groupes).map(([bid, groupe]) => `
    <div style="margin-bottom:16px;">
      <div style="font-size:12px;font-weight:700;color:var(--vert);text-transform:uppercase;letter-spacing:.5px;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;">🏪 ${groupe.nom}</div>
      ${groupe.items.map(item => `
        <div class="panier-item">
          <div class="panier-item-photo">${item.photo?`<img src="${item.photo}" style="width:56px;height:56px;border-radius:8px;object-fit:cover;">`:item.emoji}</div>
          <div class="panier-item-info">
            <div class="panier-item-nom">${item.nom}</div>
            <div class="panier-item-prix">${(item.prix*item.qty).toFixed(2)}€</div>
            <div class="panier-item-qty">
              <button class="btn-qty-sm" onclick="changeItemQty(${item.index},-1)">−</button>
              <div class="qty-sm-val">${item.qty}</div>
              <button class="btn-qty-sm" onclick="changeItemQty(${item.index},1)">+</button>
              <button class="btn-remove" onclick="supprimerItem(${item.index})">🗑️</button>
            </div>
          </div>
        </div>`).join('')}
    </div>`).join('');
  const total = panier.reduce((s,i) => s+i.prix*i.qty, 0);
  document.getElementById('panier-total').textContent = total.toFixed(2) + '€';
  document.getElementById('livraison-options').innerHTML = '<div style="font-size:12px;color:var(--ink3);margin-bottom:8px;">Les modes de livraison seront choisis au checkout pour chaque boutique.</div>';
  footer.style.display = 'block';
}

function changeItemQty(i, delta) { const item = panier[i]; const max = item.stock_illimite ? 99 : item.stock; item.qty = Math.max(1, Math.min(item.qty+delta, max)); afficherPanier(); majPanierCount(); }
function supprimerItem(i) { panier.splice(i,1); afficherPanier(); majPanierCount(); }

// ✅ CORRECTION : plus de redirection vers connexion.html
// Le checkout gère lui-même la connexion/inscription/guest
async function passerCommande() {
  if (!panier.length) { alert('Ton panier est vide.'); return; }
  window.location.href = 'checkout.html';
}
</script>
</body>
</html>
